openapi: 3.0.0
info:
  title: Order & Returns Management API
  version: 1.0.0
paths:
  /api/orders/{orderId}/history:
    get:
      summary: Get order state transition audit history
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - in: query
          name: size
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated order state transition history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseOrderStateHistoryResponse'
        '400':
          description: Invalid pagination parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/returns/{returnId}/history:
    get:
      summary: Get return state transition audit history
      parameters:
        - in: path
          name: returnId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - in: query
          name: size
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated return state transition history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseReturnStateHistoryResponse'
        '400':
          description: Invalid pagination parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Return not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/jobs/{jobId}:
    get:
      summary: Get job execution by jobId
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job execution details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobExecutionResponse'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/jobs/orders/{orderId}:
    get:
      summary: Get job executions for an order
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of job executions for order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobExecutionResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/jobs/returns/{returnId}:
    get:
      summary: Get job executions for a return
      parameters:
        - in: path
          name: returnId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of job executions for return
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobExecutionResponse'
        '404':
          description: Return not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    PageResponseOrderStateHistoryResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/OrderStateHistoryResponse'
        totalElements:
          type: integer
        totalPages:
          type: integer
    PageResponseReturnStateHistoryResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ReturnStateHistoryResponse'
        totalElements:
          type: integer
        totalPages:
          type: integer
    OrderStateHistoryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        previousState:
          $ref: '#/components/schemas/OrderState'
        newState:
          $ref: '#/components/schemas/OrderState'
        actorType:
          $ref: '#/components/schemas/ActorType'
        timestamp:
          type: string
          format: date-time
    ReturnStateHistoryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        returnId:
          type: string
          format: uuid
        previousState:
          $ref: '#/components/schemas/ReturnState'
        newState:
          $ref: '#/components/schemas/ReturnState'
        actorType:
          $ref: '#/components/schemas/ActorType'
        timestamp:
          type: string
          format: date-time
    OrderState:
      type: string
      enum: [PENDING_PAYMENT, PAID, PROCESSING_IN_WAREHOUSE, SHIPPED, DELIVERED, CANCELLED]
    ReturnState:
      type: string
      enum: [REQUESTED, APPROVED, REJECTED, IN_TRANSIT, RECEIVED, COMPLETED]
    ActorType:
      type: string
      enum: [USER, ADMIN, SYSTEM]
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        code:
          type: integer
    JobExecutionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        jobType:
          $ref: '#/components/schemas/JobType'
        relatedEntityId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/JobStatus'
        attempts:
          type: integer
        lastError:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    JobType:
      type: string
      enum: [INVOICE_GENERATION, REFUND_PROCESSING]
    JobStatus:
      type: string
      enum: [PENDING, RUNNING, SUCCESS, FAILED]
