openapi: 3.0.0
info:
  title: Order & Returns Management API
  version: 1.0.0
paths:
  /api/orders/{orderId}/history:
    get:
      summary: Get order state transition audit history
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - in: query
          name: size
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated order state transition history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseOrderStateHistoryResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/returns/{returnId}/history:
    get:
      summary: Get return state transition audit history
      parameters:
        - in: path
          name: returnId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - in: query
          name: size
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated return state transition history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseReturnStateHistoryResponse'
        '404':
          description: Return not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    PageResponseOrderStateHistoryResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/OrderStateHistoryResponse'
        totalElements:
          type: integer
        totalPages:
          type: integer
    PageResponseReturnStateHistoryResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ReturnStateHistoryResponse'
        totalElements:
          type: integer
        totalPages:
          type: integer
    OrderStateHistoryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        previousState:
          $ref: '#/components/schemas/OrderState'
        newState:
          $ref: '#/components/schemas/OrderState'
        actorType:
          $ref: '#/components/schemas/ActorType'
        timestamp:
          type: string
          format: date-time
    ReturnStateHistoryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        returnId:
          type: string
          format: uuid
        previousState:
          $ref: '#/components/schemas/ReturnState'
        newState:
          $ref: '#/components/schemas/ReturnState'
        actorType:
          $ref: '#/components/schemas/ActorType'
        timestamp:
          type: string
          format: date-time
    OrderState:
      type: string
      enum: [PENDING_PAYMENT, PAID, PROCESSING_IN_WAREHOUSE, SHIPPED, DELIVERED, CANCELLED]
    ReturnState:
      type: string
      enum: [REQUESTED, APPROVED, REJECTED, IN_TRANSIT, RECEIVED, COMPLETED]
    ActorType:
      type: string
      enum: [USER, ADMIN, SYSTEM]
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
