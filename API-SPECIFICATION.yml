openapi: 3.0.3
info:
  title: Order & Returns Management System
  version: 1.0.0
  description: Backend APIs for order lifecycle and return workflow
servers:
  - url: /api
paths:
  /orders:
    post:
      summary: Create a new order
      operationId: createOrder
      tags: [Order]
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCreateResponse'
  /orders/{orderId}/transition:
    post:
      summary: Transition order state
      operationId: transitionOrderState
      tags: [Order]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderStateTransitionRequest'
      responses:
        '200':
          description: Order state transitioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCreateResponse'
        '400':
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (terminal state)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /orders/{orderId}:
    get:
      summary: Get order by ID
      operationId: getOrderById
      tags: [Order]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderCreateResponse'
        '400':
          description: Order not found or cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /returns:
    post:
      summary: Create a return request
      operationId: createReturn
      tags: [Return]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReturnRequest'
      responses:
        '201':
          description: Return created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReturnCreateResponse'
        '409':
          description: Conflict (order not delivered or duplicate return)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /returns/{returnId}/transition:
    post:
      summary: Transition return state
      operationId: transitionReturnState
      tags: [Return]
      parameters:
        - name: returnId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReturnStateTransitionRequest'
      responses:
        '200':
          description: Return state transitioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReturnCreateResponse'
        '400':
          description: Invalid action
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (terminal state)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /returns/{returnId}:
    get:
      summary: Get return by ID
      operationId: getReturnById
      tags: [Return]
      parameters:
        - name: returnId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Return found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReturnCreateResponse'
        '400':
          description: Return not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /jobs/{jobId}:
    get:
      summary: Get job execution by ID
      operationId: getJobById
      tags: [Job]
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job execution found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobExecutionResponse'
        '404':
          description: Job not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /jobs:
    get:
      summary: Get job executions by entityId (paginated)
      operationId: getJobsByEntity
      tags: [Job]
      parameters:
        - name: entityId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated job executions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '400':
          description: Invalid pagination parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /orders/{orderId}/jobs:
    get:
      summary: Get job executions for order (paginated)
      operationId: getJobsForOrder
      tags: [Job]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated job executions for order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '400':
          description: Invalid pagination parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /returns/{returnId}/jobs:
    get:
      summary: Get job executions for return (paginated)
      operationId: getJobsForReturn
      tags: [Job]
      parameters:
        - name: returnId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated job executions for return
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '400':
          description: Invalid pagination parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /orders/{orderId}/history:
    get:
      summary: Get order audit history
      operationId: getOrderHistory
      tags: [Order]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated order audit history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /returns/{returnId}/history:
    get:
      summary: Get return audit history
      operationId: getReturnHistory
      tags: [Return]
      parameters:
        - name: returnId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Paginated return audit history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '404':
          description: Return not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /actuator/health:
    get:
      summary: Health check endpoint
      operationId: getHealthStatus
      tags: [System]
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /actuator/info:
    get:
      summary: Application info endpoint
      operationId: getAppInfo
      tags: [System]
      responses:
        '200':
          description: Application info
          content:
            application/json:
              schema:
                type: object
                properties:
                  build:
                    type: object
                    properties:
                      version:
                        type: string
                        example: 1.0.0
components:
  schemas:
    OrderCreateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        state:
          $ref: '#/components/schemas/OrderState'
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    OrderStateTransitionRequest:
      type: object
      required: [action]
      properties:
        action:
          $ref: '#/components/schemas/OrderAction'
    CreateReturnRequest:
      type: object
      required: [orderId]
      properties:
        orderId:
          type: string
          format: uuid
    ReturnCreateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        state:
          $ref: '#/components/schemas/ReturnState'
        refundStatus:
          $ref: '#/components/schemas/RefundStatus'
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    ReturnStateTransitionRequest:
      type: object
      required: [action]
      properties:
        action:
          $ref: '#/components/schemas/ReturnAction'
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
    OrderAction:
      type: string
      enum: [PAY, CANCEL, PROCESS, SHIP, DELIVER]
    OrderState:
      type: string
      enum: [PENDING_PAYMENT, PAID, PROCESSING_IN_WAREHOUSE, SHIPPED, DELIVERED, CANCELLED]
    ReturnAction:
      type: string
      enum: [APPROVE, REJECT, MARK_IN_TRANSIT, RECEIVE, COMPLETE]
    ReturnState:
      type: string
      enum: [REQUESTED, APPROVED, REJECTED, IN_TRANSIT, RECEIVED, COMPLETED]
    RefundStatus:
      type: string
      enum: [PENDING, SUCCESS, FAILED]
    JobExecutionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        jobType:
          type: string
          enum: [INVOICE_GENERATION, REFUND_PROCESSING]
        relatedEntityId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, RUNNING, SUCCESS, FAILED]
        attempts:
          type: integer
        lastError:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/JobExecutionResponse'
        totalElements:
          type: integer
        totalPages:
          type: integer
